<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VietFluent — Học Tiếng Việt Chuẩn (A1 → C1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d12; --panel:#12151c; --panel2:#181c26; --line:#232838;
  --ink:#eef1f8; --sub:#9aa3b8; --brand:#22c55e; --brand-d:#16a34a;
  --accent:#38bdf8; --warn:#f59e0b; --bad:#f43f5e; --gold:#fbbf24;
  --radius:14px; --shadow:0 8px 24px rgba(0,0,0,.35);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
[data-theme="light"]{
  --bg:#f5f7fb; --panel:#ffffff; --panel2:#f0f2f8; --line:#e3e7f1;
  --ink:#12151c; --sub:#5b6478; --shadow:0 8px 24px rgba(20,20,40,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);transition:background .2s,color .2s}
a{color:inherit}
button{font-family:inherit}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
@media(max-width:860px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:40;left:0;top:0;bottom:0;width:280px;transform:translateX(-100%);transition:transform .25s}
.sidebar.open{transform:translateX(0)}
.menuBtn{display:inline-flex !important}}

/* Sidebar */
.sidebar{background:var(--panel);border-right:1px solid var(--line);padding:18px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:center;justify-content:center;font-size:20px}
.brand h1{font-size:17px;margin:0;line-height:1.2}
.brand p{font-size:11px;color:var(--sub);margin:0}
.statRow{display:flex;gap:8px;margin-bottom:16px}
.statCard{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;text-align:center}
.statCard b{display:block;font-size:16px}
.statCard span{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.searchBox{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);margin-bottom:14px;font-size:13px}
.levelTabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.levelTab{flex:1;min-width:60px;padding:7px 4px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;text-align:center}
.levelTab.active{background:var(--brand);color:#06210f;border-color:var(--brand)}
.lessonList{display:flex;flex-direction:column;gap:6px}
.lessonItem{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent}
.lessonItem:hover{background:var(--panel2)}
.lessonItem.active{background:var(--panel2);border-color:var(--brand)}
.lessonItem .num{width:26px;height:26px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.lessonItem.done .num{background:var(--brand);color:#06210f}
.ringWrap{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--panel2);transition:background .3s}
.ringWrap.done{background:conic-gradient(var(--brand) 360deg, var(--panel2) 0)}
.ringWrap.current{background:conic-gradient(var(--accent) 270deg, var(--panel2) 0)}
.ringWrap .inner{width:21px;height:21px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--ink)}
.ringWrap.done .inner{color:var(--brand)}
.lessonItem .meta{flex:1;min-width:0}
.lessonItem .meta b{display:block;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lessonItem .meta span{font-size:10.5px;color:var(--sub)}
.lessonItem .prog{width:28px;height:28px;position:relative;flex-shrink:0}
.themeToggle{margin-top:14px;width:100%;padding:8px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);cursor:pointer;font-size:12px}

/* Main */
.main{padding:20px 26px 60px;max-width:1000px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px}
.menuBtn{display:none;background:var(--panel2);border:1px solid var(--line);border-radius:10px;width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);font-size:16px}
.lessonHeader{background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px}
.lessonHeader h2{margin:0 0 4px;font-size:20px}
.lessonHeader p{margin:0;color:var(--sub);font-size:13px}
.pillRow{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.pill{font-size:11px;padding:4px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:var(--sub)}
.pill.level{background:var(--brand);color:#06210f;border-color:var(--brand);font-weight:700}

.tabNav{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;border-bottom:1px solid var(--line)}
.tabBtn{white-space:nowrap;padding:8px 14px;border-radius:10px 10px 0 0;border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:13px;font-weight:600}
.tabBtn.active{color:var(--brand);background:var(--panel2)}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}

/* Vocab table */
.vocabItem{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:10px;border:1px solid var(--line);margin-bottom:8px;background:var(--panel2)}
.vocabItem .emo{font-size:24px;width:36px;text-align:center}
.vocabItem .body{flex:1}
.vocabItem .vi{font-size:16px;font-weight:700}
.vocabItem .en{color:var(--sub);font-size:13px;margin:2px 0}
.vocabItem .ex{font-size:12.5px;color:var(--ink);opacity:.85;margin-top:6px;border-left:2px solid var(--brand);padding-left:8px}
.vocabItem .exen{font-size:11.5px;color:var(--sub)}
.playBtn{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;flex-shrink:0;font-size:14px}

/* Vocab grid (compact, tap-to-expand cards) */
.vocabToolbar{margin-bottom:12px}
.vocabGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.vocabCard{position:relative;padding:10px 34px 10px 10px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);cursor:pointer}
.vocabCard:hover{border-color:var(--brand)}
.vcTop{display:flex;align-items:center;gap:10px}
.vcTop .vcEmo{font-size:22px;width:28px;text-align:center;flex-shrink:0}
.vcMain{flex:1;min-width:0}
.vcVi{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vcEn{font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vcChevron{position:absolute;top:12px;right:10px;font-size:11px;color:var(--sub);transition:transform .2s}
.vocabCard.expanded .vcChevron{transform:rotate(180deg)}
.vcDetail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.vocabCard.expanded .vcDetail{display:block;animation:fadeSlideIn .2s ease both}
.vcToneTag{font-size:11px;color:var(--accent);margin-bottom:6px}
.vocabCard .ex{font-size:12.5px;color:var(--ink);opacity:.85;border-left:2px solid var(--brand);padding-left:8px}
.vocabCard .exen{font-size:11.5px;color:var(--sub);margin-top:4px}
.playBtn:hover{background:var(--brand);color:#06210f;border-color:var(--brand)}

/* Buttons */
.btn{padding:10px 18px;border-radius:10px;border:none;background:var(--brand);color:#06210f;font-weight:700;cursor:pointer;font-size:13.5px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn.sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* Tone module */
.toneGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.toneCard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;cursor:pointer}
.toneCard svg{width:100%;height:50px}
.toneCard b{display:block;margin-top:6px;font-size:14px}
.toneCard span{font-size:11px;color:var(--sub)}

/* Quiz / matching */
.qOption{display:block;width:100%;text-align:left;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);cursor:pointer;margin-bottom:8px;font-size:14px}
.qOption:hover{border-color:var(--brand)}
.qOption.correct{background:rgba(34,197,94,.15);border-color:var(--brand)}
.qOption.wrong{background:rgba(244,63,94,.15);border-color:var(--bad)}
.matchGrid{display:flex;gap:16px;align-items:flex-start}
.matchCol{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.matchColLabel{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.matchCell{padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);cursor:pointer;text-align:center;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:border-color .15s,background .15s}
.matchCell.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.matchCell.ok{border-color:var(--brand);background:rgba(34,197,94,.18);color:var(--brand);font-weight:700;cursor:default}
.matchCell.wrong{border-color:var(--bad);background:rgba(244,63,94,.18);animation:shakeCell .35s}
@keyframes shakeCell{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.matchDone{text-align:center;padding:20px;color:var(--brand);font-weight:700}

/* Flashcard */
.flashWrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.flashCard{width:100%;max-width:420px;height:230px;perspective:1000px;cursor:pointer}
.flashInner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flashCard.flip .flashInner{transform:rotateY(180deg)}
.flashFace{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;background:var(--panel2)}
.flashFace.back{transform:rotateY(180deg)}
.flashFace .big{font-size:26px;font-weight:800}
.flashFace .small{color:var(--sub);margin-top:8px;font-size:14px}

/* Progress bars */
.barOuter{height:8px;border-radius:6px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
.barInner{height:100%;background:linear-gradient(90deg,var(--brand),var(--accent))}

/* Badges */
.badgeGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.heatCell{width:11px;height:11px;border-radius:2px}
.badge{text-align:center;padding:12px 6px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);opacity:.35}
.badge.earned{opacity:1;border-color:var(--gold)}
.badge .ic{font-size:26px}
.badge b{display:block;font-size:11px;margin-top:4px}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--brand);color:var(--ink);padding:10px 18px;border-radius:10px;box-shadow:var(--shadow);font-size:13px;z-index:99;display:none;animation:toastIn .3s ease}
.empty{color:var(--sub);font-size:13px;text-align:center;padding:30px 10px}
input[type=text]{padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:14px;width:100%}

/* ================= ANIMATION / POLISH ================= */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes flicker{0%,100%{transform:scale(1) rotate(-3deg);opacity:1}50%{transform:scale(1.18) rotate(4deg);opacity:.82}}
@keyframes drawTone{to{stroke-dashoffset:0}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.06);opacity:1}100%{transform:scale(1)}}

#tabContent > *{animation:fadeSlideIn .35s ease both}
.lessonList .lessonItem{animation:fadeSlideIn .25s ease both}
.flame{display:inline-block;animation:flicker 1.3s ease-in-out infinite;transform-origin:center bottom}
.toneCard svg path{stroke-dasharray:140;stroke-dashoffset:140;animation:drawTone 1s ease forwards}
.badge.earned{animation:popIn .4s ease both}

/* micro-interactions */
.btn,.tabBtn,.lessonItem,.toneCard,.qOption,.matchCell,.badge,.playBtn,.levelTab,.ringWrap,.themeToggle{
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease, background-color .15s ease, opacity .15s ease;
}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,197,94,.25)}
.btn:active:not(:disabled){transform:translateY(0) scale(.96)}
.tabBtn:hover{transform:translateY(-1px)}
.lessonItem:hover{transform:translateX(2px)}
.toneCard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.qOption:hover{transform:translateX(2px)}
.matchCell:hover{transform:translateY(-1px)}
.badge:hover{transform:translateY(-2px)}
.playBtn:active{transform:scale(.9)}
.levelTab:hover{transform:translateY(-1px)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">🇻🇳</div>
      <div><h1>VietFluent</h1><p>A1 → C1 · 100 lessons · 4,500 words</p></div>
    </div>
    <div class="statRow">
      <div class="statCard"><b id="statXp">0</b><span>XP</span></div>
      <div class="statCard"><b id="statStreak">0</b><span id="streakLabel">Streak</span></div>
      <div class="statCard"><b id="statDone">0/100</b><span>Lessons</span></div>
      <div class="statCard" id="statReviewCard" style="cursor:pointer" onclick="jumpToReview()"><b id="statReview">0</b><span>Due</span></div>
    </div>
    <div class="barOuter" id="dailyGoalBar" style="margin-bottom:6px;cursor:default" title="Daily XP goal"><div class="barInner" id="dailyGoalBarInner" style="width:0%"></div></div>
    <div class="row" id="dailyGoalLabel" style="justify-content:space-between;margin-bottom:14px;font-size:10.5px;color:var(--sub)"><span id="dailyGoalText">0 / 20 XP today</span><span id="freezeLabel"></span></div>
    <input class="searchBox" id="search" placeholder="🔍 Search words, lessons...">
    <div class="levelTabs" id="levelTabs"></div>
    <div class="lessonList" id="lessonList"></div>
    <button class="themeToggle" id="themeToggle">🌓 Toggle Light / Dark</button>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menuBtn" id="menuBtn">☰</button>
      <div style="flex:1"></div>
    </div>

    <div class="lessonHeader" id="lessonHeader"></div>

    <div class="tabNav" id="tabNav"></div>
    <div id="tabContent"></div>
  </main>
</div>
<div class="toast" id="toast"></div>
<canvas id="confettiCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:200;display:none"></canvas>

<script>
/* ================= DATA ================= */
const LEVELS = [
  {id:"A1", name:"Beginner", range:[1,25], color:"#22c55e"},
  {id:"A2", name:"Elementary", range:[26,50], color:"#38bdf8"},
  {id:"B1", name:"Intermediate", range:[51,75], color:"#f59e0b"},
  {id:"B2C1", name:"Advanced", range:[76,100], color:"#f43f5e"}
];

const lessonMeta = {};
const lessonWords = {};
const TONE_EN_MAP = {
  "ngang":"level", "huyền":"falling", "sắc":"rising",
  "hỏi":"dipping", "ngã":"broken-rising", "nặng":"heavy"
};
function toneLabel(str){
  if(!str) return "";
  return str.split("+").map(t=>TONE_EN_MAP[t.trim()]||t.trim()).join(" + ");
}

function defineLesson(id, title, topic, icon, words){
  const lvl = LEVELS.find(l=> id>=l.range[0] && id<=l.range[1]);
  lessonMeta[id] = {title, topic, icon, level: lvl.id};
  lessonWords[id] = words.map(w=>({
    vi:w[0], ipa:w[1], en:w[2], ex:w[3], exEn:w[4], note:w[5]||"", emoji:w[6]||"💬", tone:w[7]||""
  }));
}

/* ---- LESSON 1 ---- */
defineLesson(1, "Basic Greetings", "Greetings", "👋", [
["xin chào","sin chao","hello","Xin chào, tôi tên là Minh.","Hello, my name is Minh.","The most common greeting — used any time, any place.","👋","ngang+huyền"],
["tạm biệt","tam biet","goodbye","Tạm biệt, hẹn gặp lại!","Goodbye, see you again!","Used when parting ways, works in both casual and formal settings.","👋","nặng+nặng"],
["cảm ơn","cam on","thank you","Cảm ơn bạn rất nhiều.","Thank you very much.","Often paired with 'rất nhiều' (very much) for emphasis.","🙏","hỏi+ngang"],
["xin lỗi","sin loi","sorry / excuse me","Xin lỗi, tôi đến muộn.","Sorry, I'm late.","Used to apologize or to politely get someone's attention.","🙏","ngang+hỏi"],
["vâng / dạ","vang / da","yes (polite)","Dạ, tôi hiểu rồi.","Yes, I understand now.","'Dạ' is more polite — use it with elders or superiors.","✅","huyền/nặng"],
["không","khong","no","Không, tôi không biết.","No, I don't know.","The most basic negation word in Vietnamese.","❌","không dấu"],
["tôi","toi","I / me","Tôi là sinh viên.","I am a student.","Neutral, all-purpose first-person pronoun.","🙋","ngang"],
["bạn","ban","you (friend)","Bạn tên là gì?","What is your name?","Used with peers of similar age.","🙋","nặng"],
["tên","ten","name","Tên của tôi là Lan.","My name is Lan.","Usually follows 'là' (to be) or 'của tôi' (my).","📛","huyền"],
["là","la","to be","Đây là bạn tôi.","This is my friend.","The verb 'to be' — used to define or introduce something.","🔗","huyền"],
["gì","gi","what","Bạn muốn ăn gì?","What do you want to eat?","Placed at the end of a question to ask about a thing.","❓","huyền"],
["rất vui được gặp bạn","rat vui duoc gap ban","nice to meet you","Rất vui được gặp bạn!","Nice to meet you!","A social phrase said when meeting someone for the first time.","🤝","nặng+ngang"],
["bạn khỏe không?","ban khoe khong","how are you?","Chào bạn, bạn khỏe không?","Hi, how are you?","A familiar question used in everyday conversation.","😊","hỏi"],
["tôi khỏe, cảm ơn","toi khoe cam on","I'm fine, thank you","Tôi khỏe, cảm ơn bạn.","I'm fine, thank you.","The standard reply to 'how are you'.","😊","hỏi"],
["chào buổi sáng","chao buoi sang","good morning","Chào buổi sáng, cả nhà!","Good morning, everyone!","Used in the morning — fine for both casual and formal contexts.","🌅","huyền+hỏi"],
["chào buổi tối","chao buoi toi","good evening","Chào buổi tối, chúc ngủ ngon.","Good evening, sleep well.","Used when meeting someone in the evening.","🌙","huyền+hỏi"],
["hẹn gặp lại","hen gap lai","see you again","Hẹn gặp lại vào tuần sau.","See you again next week.","A friendly farewell implying you'll meet again.","👋","nặng"],
["làm ơn","lam on","please","Làm ơn giúp tôi với.","Please help me.","Placed before a request to make it more polite.","🙏","huyền"],
["không sao","khong sao","it's okay / no problem","Không sao, đừng lo lắng.","It's okay, don't worry.","Used to reassure someone or brush off a small mistake.","👍","ngang"],
["anh","anh","older brother / you (male)","Anh ơi, cho tôi hỏi.","Excuse me sir, may I ask.","Used to address a man slightly older than you.","👨","ngang"],
["chị","chi","older sister / you (female)","Chị ơi, đây là gì vậy?","Excuse me miss, what is this?","Used to address a woman slightly older than you.","👩","nặng"],
["em","em","younger sibling / you (younger)","Em tên là gì?","What's your name? (to younger person)","Used when speaking to someone younger than you.","🧑","ngang"],
["ông","ong","grandfather / sir","Ông ơi, ông khỏe không?","Grandpa, how are you?","A respectful term for an older man.","👴","huyền"],
["bà","ba","grandmother / madam","Bà nấu ăn rất ngon.","Grandma cooks very well.","A respectful term for an older woman.","👵","huyền"],
["xin giới thiệu","sin gioi thieu","allow me to introduce","Xin giới thiệu, đây là bạn tôi.","Allow me to introduce, this is my friend.","A formal opener used when introducing someone.","🤝","ngang"],
["hân hạnh","han hanh","it's an honor / pleasure","Hân hạnh được làm quen.","Pleasure to make your acquaintance.","More formal than 'rất vui' — used in polite settings.","✨","ngang"],

/* ================= STATE ================= */
const state = {
  currentLesson: 1,
  currentTab: "today",
  xp: 0, streak: 0, lastStudyDate: null,
  completedLessons: {},
  wordStats: {},
  mistakes: {},
  srs: {},
  dailyXp: {},
  dailyGoal: 20,
  streakFreezes: 1,
  lastFreezeGain: null,
  notes: "",
  theme: "dark"
};

function loadState(){
  try{
    const raw = localStorage.getItem("vietfluent_state");
    if(raw) Object.assign(state, JSON.parse(raw));
  }catch(e){}
  if(!state.srs) state.srs = {};
  if(!state.dailyXp) state.dailyXp = {};
  if(!state.dailyGoal) state.dailyGoal = 20;
  if(state.streakFreezes==null) state.streakFreezes = 1;
  // Migrate any legacy mistake entries (pre-SRS) into review cards so past progress isn't lost.
  if(state.mistakes){
    Object.keys(state.mistakes).forEach(key=>{
      if(!state.srs[key]){
        const m = state.mistakes[key];
        state.srs[key] = {lesson:m.lesson, vi:m.vi, en:m.en, ex:m.ex, exEn:m.exEn||"", ease:2.5, interval:0, reps:0, due:Date.now(), lapses:m.count||1};
      }
    });
  }
}
function saveState(){
  localStorage.setItem("vietfluent_state", JSON.stringify(state));
}

/* ================= UTIL ================= */
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display="none"; void t.offsetWidth; t.style.display="block";
  clearTimeout(t._h);
  t._h = setTimeout(()=>t.style.display="none", 2200);
}
function animateCount(el, from, to, dur){
  from = Number(from)||0; to = Number(to)||0;
  if(from===to){ el.textContent = to; return; }
  const start = performance.now();
  function step(now){
    const p = Math.min(1, (now-start)/dur);
    const val = Math.round(from + (to-from)*p);
    el.textContent = val;
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function confettiBurst(){
  const canvas = document.getElementById("confettiCanvas");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  canvas.style.display = "block";
  const ctx = canvas.getContext("2d");
  const colors = ["#22c55e","#38bdf8","#fbbf24","#f43f5e","#a78bfa"];
  const pieces = Array.from({length:90}, ()=>({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*canvas.height*0.3,
    w: 6+Math.random()*6, h: 8+Math.random()*8,
    vy: 2+Math.random()*3, vx: -2+Math.random()*4,
    rot: Math.random()*360, vr: -8+Math.random()*16,
    color: colors[Math.floor(Math.random()*colors.length)]
  }));
  let frame = 0;
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frame++;
    let alive = false;
    pieces.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if(p.y < canvas.height+20) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if(alive && frame<220) requestAnimationFrame(loop);
    else { canvas.style.display="none"; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  loop();
}
let _viVoice = null, _viWarned = false;
function pickViVoice(){
  if(typeof speechSynthesis === "undefined") return null;
  const voices = speechSynthesis.getVoices() || [];
  if(!voices.length) return null;
  const viVoices = voices.filter(v=>v.lang && v.lang.toLowerCase().startsWith("vi"));
  if(!viVoices.length) return null;
  // Prefer named neural/cloud voices (Microsoft HoaiMy/NamMinh, Google) when the OS/browser offers them —
  // they sound far more natural than the default robotic Vietnamese voice.
  return viVoices.find(v=>/hoaimy|namminh|neural|google/i.test(v.name))
    || viVoices.find(v=>v.localService===false)
    || viVoices[0];
}
if(typeof speechSynthesis !== "undefined"){
  speechSynthesis.onvoiceschanged = ()=>{ _viVoice = pickViVoice(); };
}
function speak(text, rate){
  try{
    // Chrome loads its voice list asynchronously and doesn't always fire
    // onvoiceschanged again once it has fired once — if the very first
    // lookup ran before the Vietnamese voice was registered, retry on every
    // call until one is actually found, instead of giving up forever.
    if(!_viVoice) _viVoice = pickViVoice();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "vi-VN"; u.rate = rate||0.9; u.pitch = 1;
    if(_viVoice){
      u.voice = _viVoice;
    } else if(!_viWarned && speechSynthesis.getVoices().length){
      _viWarned = true;
      toast("⚠️ No Vietnamese voice found on this device. Try Chrome/Edge, or install a Vietnamese voice in your OS settings.");
    }
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(e){}
}
function addXp(n){
  // Only refresh the sidebar (XP/streak/review counters), not the whole tab —
  // a full render() here used to immediately regenerate a fresh quiz/dictation/
  // tone question, wiping out the "correct!" feedback before it could be seen.
  state.xp += n;
  const today = new Date().toDateString();
  state.dailyXp[today] = (state.dailyXp[today]||0) + n;
  saveState(); renderSidebar();
}
function touchStreak(){
  const today = new Date().toDateString();
  if(state.lastStudyDate !== today){
    const oneDay = 86400000;
    const y1 = new Date(Date.now()-oneDay).toDateString();
    const y2 = new Date(Date.now()-2*oneDay).toDateString();
    if(state.lastStudyDate === y1){
      state.streak += 1;
    } else if(state.lastStudyDate === y2 && state.streakFreezes>0){
      state.streakFreezes -= 1;
      state.streak += 1;
      toast("🧊 Streak freeze used — your streak is safe!");
    } else {
      state.streak = 1;
    }
    state.lastStudyDate = today;
    if(state.streak>0 && state.streak%7===0 && state.lastFreezeGain!==state.streak){
      state.streakFreezes = Math.min(2, state.streakFreezes+1);
      state.lastFreezeGain = state.streak;
      toast("🧊 +1 Streak Freeze earned for a "+state.streak+"-day streak!");
    }
    saveState();
  }
}

/* ================= SRS (spaced repetition, SM-2 lite) ================= */
function srsKey(lessonId, vi){ return lessonId+"::"+vi; }
function applySm2(card, rating){
  card.reps = card.reps||0; card.ease = card.ease||2.5; card.interval = card.interval||0; card.lapses = card.lapses||0;
  if(rating==="again"){
    card.lapses += 1; card.reps = 0; card.interval = 0; card.ease = Math.max(1.3, card.ease-0.2);
  } else {
    if(card.reps===0) card.interval = 1;
    else if(card.reps===1) card.interval = 6;
    else card.interval = Math.round(card.interval*card.ease);
    if(rating==="hard"){ card.interval = Math.max(1, Math.round(card.interval*0.8)); card.ease = Math.max(1.3, card.ease-0.15); }
    else if(rating==="easy"){ card.interval = Math.max(1, Math.round(card.interval*1.3)); card.ease = card.ease+0.15; }
    card.reps += 1;
  }
  card.due = Date.now() + card.interval*86400000;
  card.lastReview = Date.now();
}
function srsRate(lessonId, word, rating){
  const key = srsKey(lessonId, word.vi);
  let card = state.srs[key];
  if(!card){
    card = {lesson:lessonId, vi:word.vi, en:word.en, ex:word.ex, exEn:word.exEn||"", ease:2.5, interval:0, reps:0, due:Date.now(), lapses:0};
    state.srs[key] = card;
  }
  applySm2(card, rating);
  saveState();
}
function srsEnrollLesson(lessonId){
  const words = lessonWords[lessonId]||[];
  words.forEach(w=>{
    const key = srsKey(lessonId, w.vi);
    if(!state.srs[key]){
      state.srs[key] = {lesson:lessonId, vi:w.vi, en:w.en, ex:w.ex, exEn:w.exEn||"", ease:2.5, interval:0, reps:0, due:Date.now(), lapses:0};
    }
  });
}
function srsDueCount(){
  const now = Date.now();
  return Object.values(state.srs).filter(c=>c.due<=now).length;
}
function jumpToReview(){
  state.currentTab = "mistakes";
  document.getElementById("sidebar").classList.remove("open");
  render();
}

function checkBadges(prevEarned){
  const nowEarned = BADGES.filter(b=>b.cond(state)).map(b=>b.id);
  const newOnes = nowEarned.filter(id=>!prevEarned.includes(id));
  newOnes.forEach(id=>{
    const b = BADGES.find(x=>x.id===id);
    toast("🎉 New badge: "+b.name);
    confettiBurst();
  });
  return nowEarned;
}

/* Pitch contours follow the standard 5-level Hanoi Vietnamese tone chart
   (1=lowest ... 5=highest). y = 47 - (level-1)*10, so level1→y47 (low), level5→y7 (high). */
const TONE_INFO = [
  {viName:"Ngang", enName:"Level tone", mark:"a", symbol:"(no mark)", desc:"Mid-high and flat — the everyday speaking pitch, no rise or fall", paths:["M5,17 L95,17"]},
  {viName:"Huyền", enName:"Falling tone", mark:"à", symbol:"`  grave accent", desc:"Starts mid, glides gently down to low — soft, breathy voice", paths:["M5,17 L95,45"]},
  {viName:"Sắc", enName:"Rising tone", mark:"á", symbol:"´  acute accent", desc:"Starts mid-high, rises sharply to the highest pitch", paths:["M5,17 L95,7"]},
  {viName:"Hỏi", enName:"Dipping tone", mark:"ả", symbol:"ˀ  hook above", desc:"Starts mid-low, dips down low, then curves back up", paths:["M5,27 Q40,47 75,32 T95,22"]},
  {viName:"Ngã", enName:"Broken-rising tone", mark:"ã", symbol:"~  tilde", desc:"Starts mid, rises slightly, a glottal break (creak) interrupts it, then shoots up sharply", paths:["M5,27 Q18,20 28,27","M38,32 Q55,10 95,5"]},
  {viName:"Nặng", enName:"Heavy tone", mark:"ạ", symbol:"˙  dot below", desc:"Starts low-mid and drops fast to the lowest pitch — short, choked off by the throat", paths:["M5,27 L60,47"], dot:[60,47]}
];

    <div class="toneGrid">

const MINIMAL_PAIRS = [
  ["ma","mà","má","mả","mã","mạ"],["la","là","lá","lả","lã","lạ"],
  ["ba","bà","bá","bả","bã","bạ"],["ca","cà","cá","cả","cã","cạ"]
];
let currentMP = null;
function newMinimalPair(){

function checkMP(btn, w){

  else{ btn.classList.add("wrong"); opts.forEach(o=>{if(o.textContent===currentMP)o.classList.add("correct")}); }

let listenState = null;
function initListen(){
  const words = lessonWords[state.currentLesson]||[];
  if(!words.length){ listenState=null; return; }
  listenState = {
    lessonId: state.currentLesson,
    order: words.map((_,i)=>i),
    idx: 0,
    revealed: false,
    understood: new Set()
  };
}
function shuffleListen(){
  if(!listenState) return;
  for(let i=listenState.order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [listenState.order[i], listenState.order[j]] = [listenState.order[j], listenState.order[i]];
  }
  listenState.idx = 0;
  listenState.revealed = false;
  renderListen();
}
function playListenCurrent(rate){
  const words = lessonWords[state.currentLesson]||[];
  if(!listenState || !words.length) return;
  const w = words[listenState.order[listenState.idx]];
  speak(w.vi, rate);
}
function revealListen(){
  if(!listenState) return;
  listenState.revealed = true;
  renderListen();
}
function navListen(d){
  if(!listenState) return;
  const words = lessonWords[state.currentLesson]||[];
  listenState.idx = Math.max(0, Math.min(words.length-1, listenState.idx+d));
  listenState.revealed = false;
  renderListen();
}
function markListenUnderstood(ok){
  if(!listenState) return;
  const words = lessonWords[state.currentLesson]||[];
  const w = words[listenState.order[listenState.idx]];
  listenState.understood.add(listenState.order[listenState.idx]);
  if(!ok) markMistake(w);
  else srsRate(state.currentLesson, w, "good");
  if(listenState.idx < words.length-1){
    navListen(1);
  } else {
    listenState.revealed = true;
    renderListen();
  }
  if(ok) addXp(1);
}
function renderListen(){
  const el = document.getElementById("tabContent");
  if(el) el.innerHTML = tabListen();
}
function tabListen(){
  const words = lessonWords[state.currentLesson]||[];
  if(!words.length) return '<div class="card empty">No content yet.</div>';
  if(!listenState || listenState.lessonId!==state.currentLesson) initListen();

let currentDict = null;

function newDictation(){

function normalizeVi(s){

function checkDictation(){

const MATCH_BATCH_SIZE = 6;
function tabMatch(){
  return `<div class="card">
    <div class="row" style="justify-content:space-between">
      <h3 style="margin:0">Match Vietnamese words with their meaning</h3>
      <span class="pill" id="matchProgressPill"></span>
    </div>
    <div id="matchArea" class="matchGrid" style="margin-top:12px"></div>
    <button class="btn sm ghost" style="margin-top:10px" onclick="newMatch(matchState?matchState.batchIndex:0)">🔀 Shuffle this set</button>
  </div>`;
}
let matchState = null;
function newMatch(batchIndex){
  if(matchState) clearTimeout(matchState._advanceTimer);
  const words = lessonWords[state.currentLesson]||[];
  if(!words.length){ matchState=null; return; }
  const totalBatches = Math.max(1, Math.ceil(words.length/MATCH_BATCH_SIZE));
  if(batchIndex==null) batchIndex = 0;
  batchIndex = ((batchIndex % totalBatches) + totalBatches) % totalBatches;
  const start = batchIndex*MATCH_BATCH_SIZE;
  const pick = words.slice(start, start+MATCH_BATCH_SIZE);
  matchState = {
    lessonId: state.currentLesson,
    batchIndex, totalBatches,
    pick,
    viOrder: pick.map((w,i)=>i).sort((a,b)=>pick[a].vi.localeCompare(pick[b].vi)),
    enOrder: pick.map((w,i)=>i).sort(()=>Math.random()-0.5),
    selVi:null, selEn:null, matched:new Set(), mismatch:false, _advanceTimer:null
  };
  renderMatch();
}
function renderMatch(){
  const area = document.getElementById("matchArea");
  if(!area) return;
  if(!matchState || matchState.lessonId!==state.currentLesson){ newMatch(0); return; }
  const {pick, viOrder, enOrder, matched, selVi, selEn, mismatch, batchIndex, totalBatches} = matchState;
  const pill = document.getElementById("matchProgressPill");
  if(pill) pill.textContent = `Set ${batchIndex+1}/${totalBatches}`;
  if(matched.size === pick.length && pick.length>0){
    const isLast = batchIndex >= totalBatches-1;
    area.innerHTML = `<div class="matchDone">🎉 Set ${batchIndex+1}/${totalBatches} complete!<br><span style="font-weight:400;font-size:12.5px;color:var(--sub)">${isLast?"You matched every word in this lesson! Restarting from set 1...":"Loading the next set..."}</span></div>`;
    matchState._advanceTimer = setTimeout(()=>{
      newMatch(isLast ? 0 : batchIndex+1);
    }, 1300);
    return;
  }
  function cellClass(kind, idx){
    if(matched.has(idx)) return "ok";
    const isSel = kind==="vi" ? selVi===idx : selEn===idx;
    if(isSel) return mismatch ? "wrong" : "sel";
    return "";
  }
  const viCol = viOrder.map(idx=>{
    const w = pick[idx];
    const cls = cellClass("vi", idx);
    const label = matched.has(idx) ? "✓ "+w.vi : w.vi;
    return `<div class="matchCell ${cls}" onclick="selectMatch('vi',${idx})">${label}</div>`;
  }).join("");
  const enCol = enOrder.map(idx=>{
    const w = pick[idx];
    const cls = cellClass("en", idx);
    const label = matched.has(idx) ? "✓ "+w.en : w.en;
    return `<div class="matchCell ${cls}" onclick="selectMatch('en',${idx})">${label}</div>`;
  }).join("");
  area.innerHTML = `<div class="matchCol"><div class="matchColLabel">Tiếng Việt</div>${viCol}</div>
    <div class="matchCol"><div class="matchColLabel">English</div>${enCol}</div>`;
}
function selectMatch(kind, idx){
  if(matchState.matched.has(idx) || matchState.mismatch) return;
  if(kind==="vi") matchState.selVi = (matchState.selVi===idx ? null : idx);
  else matchState.selEn = (matchState.selEn===idx ? null : idx);
  if(matchState.selVi!=null && matchState.selEn!=null){
    if(matchState.selVi===matchState.selEn){
      matchState.matched.add(matchState.selVi);
      addXp(2);
      srsRate(state.currentLesson, matchState.pick[matchState.selVi], "good");
      matchState.selVi=null; matchState.selEn=null;
      renderMatch();
    } else {
      // wrong pair: flash red on both cells, then reset after a short pause
      matchState.mismatch = true;
      renderMatch();
      setTimeout(()=>{
        matchState.selVi=null; matchState.selEn=null; matchState.mismatch=false;
        renderMatch();
      }, 600);
      return;
    }
  } else {
    renderMatch();
  }
}

/* ================= SENTENCE BUILDER ================= */
let sentenceState = null;
function tabSentence(){
  return `<div class="card">
    <h3>Sentence Builder</h3>
    <p style="color:var(--sub);font-size:13px">Tap the tiles in order to rebuild the Vietnamese sentence, then check your answer.</p>
    <div id="sentenceArea"></div>
    <div class="row" style="margin-top:12px">
      <button class="btn sm ghost" onclick="newSentence()">🔄 New sentence</button>
    </div>
  </div>`;
}
function renderSentenceArea(){
  const area = document.getElementById("sentenceArea");
  if(!area) return;
  if(!sentenceState){ area.innerHTML = '<div class="empty">No sentences long enough for this exercise in this lesson yet.</div>'; return; }
  const {tokens, bank, answer, checked, correct, word} = sentenceState;
  const answerRow = answer.length
    ? answer.map((idx,pos)=>`<button class="matchCell" style="display:inline-block;width:auto;padding:8px 12px;margin:4px" onclick="sentenceUndo(${pos})">${tokens[idx]}</button>`).join("")
    : '<span style="color:var(--sub);font-size:13px">Tap tiles below to build the sentence...</span>';
  const bankRow = bank.map(idx=>`<button class="matchCell" style="display:inline-block;width:auto;padding:8px 12px;margin:4px" onclick="sentencePick(${idx})">${tokens[idx]}</button>`).join("");
  area.innerHTML = `
    <div class="pill" style="display:inline-block;margin-bottom:10px">💡 Means: "${word.en}"</div>
    <div style="min-height:56px;padding:10px;border:1px dashed var(--line);border-radius:10px;margin-bottom:10px">${answerRow}</div>
    <div style="margin-bottom:12px">${bankRow}</div>
    ${checked ? `
    <div class="row" style="padding:10px 12px;border-radius:10px;border:1px solid ${correct?"var(--brand)":"var(--bad)"};background:${correct?"rgba(34,197,94,.15)":"rgba(244,63,94,.15)"};font-weight:700;font-size:14px;margin-bottom:10px">
      ${correct ? "✅ Correct! +3 XP" : "❌ Not quite. Correct order: "+tokens.join(" ")}
    </div>
    <button class="btn sm" onclick="newSentence()">Next sentence →</button>
    ` : `
    ${bank.length ? `<p style="color:var(--warn);font-size:12.5px;margin:0 0 8px">👆 Place all the tiles first — ${bank.length} left.</p>` : ""}
    <div class="row">
      <button class="btn" onclick="sentenceCheck()" ${bank.length? 'disabled style="background:var(--panel2);color:var(--sub);border:1px solid var(--line)"' : ""}>Check</button>
      <button class="btn ghost sm" onclick="sentenceReset()">↺ Reset</button>
      <button class="btn ghost sm" onclick="speak('${word.vi.replace(/'/g,"\\'")}')">🔊 Hear the word</button>
    </div>
    `}
  `;
}
function newSentence(){
  const words = lessonWords[state.currentLesson]||[];
  // Prefer shorter, simpler sentences (3-6 words) — only fall back to longer
  // ones if a lesson has nothing short, so the exercise doesn't suddenly jump
  // from single vocab words to long, hard-to-parse sentences.
  const withLen = words.filter(w=>w.ex).map(w=>({w, len:w.ex.trim().split(/\s+/).length})).filter(x=>x.len>=3);
  const easy = withLen.filter(x=>x.len<=6).map(x=>x.w);
  const candidates = easy.length ? easy : withLen.map(x=>x.w);
  if(!candidates.length){ sentenceState=null; renderSentenceArea(); return; }
  let w = candidates[Math.floor(Math.random()*candidates.length)];
  if(candidates.length>1 && sentenceState && sentenceState.word && w.vi===sentenceState.word.vi){
    w = candidates[(candidates.indexOf(w)+1)%candidates.length];
  }
  const tokens = w.ex.trim().split(/\s+/);
  const order = tokens.map((t,i)=>i);
  let shuffled = [...order].sort(()=>Math.random()-0.5);
  if(tokens.length>1 && shuffled.every((v,i)=>v===order[i])){
    [shuffled[0],shuffled[1]] = [shuffled[1],shuffled[0]];
  }
  sentenceState = {lessonId: state.currentLesson, word:w, tokens, bank:shuffled, answer:[], checked:false, correct:false};
  renderSentenceArea();
}
function sentencePick(tokenIdx){
  if(!sentenceState || sentenceState.checked) return;
  const pos = sentenceState.bank.indexOf(tokenIdx);
  if(pos===-1) return;
  sentenceState.bank.splice(pos,1);
  sentenceState.answer.push(tokenIdx);
  renderSentenceArea();
}
function sentenceUndo(pos){
  if(!sentenceState || sentenceState.checked) return;
  const tokenIdx = sentenceState.answer[pos];
  sentenceState.answer.splice(pos,1);
  sentenceState.bank.push(tokenIdx);
  renderSentenceArea();
}
function sentenceCheck(){
  if(!sentenceState || sentenceState.bank.length>0) return;
  const isCorrect = sentenceState.answer.every((idx,i)=>idx===i);
  sentenceState.checked = true;
  sentenceState.correct = isCorrect;
  if(isCorrect){ addXp(3); srsRate(sentenceState.lessonId, sentenceState.word, "good"); }
  else { markMistake(sentenceState.word); }
  renderSentenceArea();
}
function sentenceReset(){
  if(!sentenceState) return;
  sentenceState.bank = sentenceState.bank.concat(sentenceState.answer).sort(()=>Math.random()-0.5);
  sentenceState.answer = [];
  sentenceState.checked = false;
  renderSentenceArea();
}

let _reviewRevealedKey = null;
function revealReviewCard(){
  const now = Date.now();

function rateReviewCard(rating){

  if(!due.length) return;
  const [,card] = due[0];
  applySm2(card, rating);
  _reviewRevealedKey = null;
  const xpMap = {again:0, hard:1, good:2, easy:3};
  const gained = xpMap[rating];
  if(gained>0){
    state.xp += gained;
    const today = new Date().toDateString();
    state.dailyXp[today] = (state.dailyXp[today]||0) + gained;

    <div class="row" style="gap:8px;flex-wrap:nowrap">
      <button class="btn ghost sm" style="flex:1" onclick="rateReviewCard('again')">❌ Again</button>

  }

      <p style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Upcoming reviews</p>

function buildHeatmapHtml(){
  const days = 91;
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(today.getTime()-(days-1)*86400000);
  const startDow = start.getDay();
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let i=0;i<days;i++) cells.push(new Date(start.getTime()+i*86400000));
  const goal = state.dailyGoal||20;
  return cells.map(d=>{
    if(!d) return '<div class="heatCell" style="visibility:hidden"></div>';
    const key = d.toDateString();
    const xp = state.dailyXp[key]||0;
    let level = 0;
    if(xp>0){
      if(xp<goal*0.5) level=1;
      else if(xp<goal) level=2;
      else if(xp<goal*2) level=3;
      else level=4;
    }
    const bg = level===0 ? "var(--panel2)" : "var(--brand)";
    const op = [1,0.35,0.55,0.78,1][level];
    return `<div class="heatCell" title="${d.toLocaleDateString()}: ${xp} XP" style="background:${bg};opacity:${op}"></div>`;
  }).join("");
}
function setDailyGoal(v){
  state.dailyGoal = parseInt(v,10)||20;
  saveState(); render();
}
function tabProgress(){
  const doneCount = Object.keys(state.completedLessons).length;
  return `<div class="grid2">
    <div class="card">
      <h3>Overall progress</h3>
      <div class="barOuter"><div class="barInner" style="width:${doneCount}%"></div></div>
      <p style="color:var(--sub);font-size:13px;margin-top:8px">${doneCount}/100 lessons · ${state.xp} XP</p>
      ${LEVELS.map(l=>{
        const cnt = Object.keys(state.completedLessons).filter(id=>id>=l.range[0]&&id<=l.range[1]).length;
        const total = l.range[1]-l.range[0]+1;
        return `<p style="font-size:12.5px;color:var(--sub);margin:8px 0 2px">${l.name} (${l.id})</p>
        <div class="barOuter"><div class="barInner" style="width:${(cnt/total*100)}%;background:${l.color}"></div></div>`;
      }).join("")}
    </div>
    <div class="card">
      <h3>Badges</h3>
      <div class="badgeGrid">
        ${BADGES.map(b=>`<div class="badge ${b.cond(state)?'earned':''}"><div class="ic">${b.ic}</div><b>${b.name}</b></div>`).join("")}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="row" style="justify-content:space-between;flex-wrap:wrap;margin-bottom:10px">
      <h3 style="margin:0">Study streak</h3>
      <span class="pill">${state.streak} day${state.streak===1?"":"s"} ${state.streak>0?"🔥":""} · 🧊×${state.streakFreezes}</span>
    </div>
    <div style="overflow-x:auto">${buildHeatmapHtml()}</div>
    <p style="color:var(--sub);font-size:11px;margin:8px 0 0">Last ~13 weeks · darker green = more XP that day. Streak freezes protect your streak if you miss a day, and you earn one every 7-day streak (max 2).</p>
    <div class="row" style="margin-top:12px;font-size:12.5px;color:var(--sub)">
      <span>Daily goal:</span>
      <select id="dailyGoalSelect" onchange="setDailyGoal(this.value)" style="padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--ink)">
        ${[10,20,30,50].map(v=>`<option value="${v}" ${state.dailyGoal===v?"selected":""}>${v} XP/day</option>`).join("")}
      </select>
    </div>
  </div>
  <div class="card">
    <h3>Export / Import data</h3>
    <div class="row">
      <button class="btn sm" onclick="exportData()">⬇️ Export JSON</button>
      <button class="btn sm ghost" onclick="document.getElementById('importFile').click()">⬆️ Import JSON</button>
      <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this.files[0])">
    </div>
  </div>`;
}
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "vietfluent_progress.json"; a.click();
}
function importData(file){
  if(!file) return;
  const r = new FileReader();
  r.onload = e=>{ try{ Object.assign(state, JSON.parse(e.target.result)); saveState(); render(); toast("Data imported"); }catch(err){ toast("Invalid file"); } };
  r.readAsText(file);
}

/* ================= MAIN RENDER ================= */
function renderTabContent(){
  const c = document.getElementById("tabContent");
  const fns = {today:tabToday, vocab:tabVocab, tones:tabTones, listen:tabListen, dictation:tabDictation, quiz:tabQuiz, match:tabMatch, sentence:tabSentence, flash:tabFlash, mistakes:tabMistakes, progress:tabProgress};
  const fn = fns[state.currentTab] || tabToday;
  c.innerHTML = fn();
  if(state.currentTab==="today"){
    const btn = document.getElementById("completeBtn");
    if(btn) btn.onclick = completeLesson;
  }
  if(state.currentTab==="quiz") newQuiz();
  if(state.currentTab==="match") {
    if(!matchState || matchState.lessonId!==state.currentLesson) newMatch(0);
    else renderMatch();
  }
  if(state.currentTab==="sentence") {
    if(!sentenceState || sentenceState.lessonId!==state.currentLesson) newSentence();
    else renderSentenceArea();
  }
  if(state.currentTab==="flash") fillFlash();
  if(state.currentTab==="dictation") newDictation();
  if(state.currentTab==="tones") newMinimalPair();
}
function completeLesson(){
  const prevBadges = BADGES.filter(b=>b.cond(state)).map(b=>b.id);
  state.completedLessons[state.currentLesson] = true;
  srsEnrollLesson(state.currentLesson);
  touchStreak();
  addXp(50);
  checkBadges(prevBadges);
  saveState();
  render();
  toast("🎉 Lesson "+state.currentLesson+" complete! +50 XP");
  confettiBurst();
}
function render(){
  renderSidebar();
  renderHeader();
  renderTabNav();
  renderTabContent();
}

/* ================= INIT ================= */
document.getElementById("menuBtn").onclick = ()=>document.getElementById("sidebar").classList.toggle("open");
document.getElementById("search").oninput = renderSidebar;
document.getElementById("themeToggle").onclick = ()=>{
  state.theme = state.theme==="dark" ? "light":"dark";
  document.documentElement.setAttribute("data-theme", state.theme);
  saveState();
};
loadState();
document.documentElement.setAttribute("data-theme", state.theme||"dark");
render();
</script>
</body>
</html>
